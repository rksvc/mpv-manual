[project]
site_name = "mpv"
copyright = "Copyright &copy; 2012-2026 mpv.io"
extra_css = ["assets/extra.css"]
extra_javascript = ["assets/extra.js"]
nav = [
    { "Synopsis" = "synopsis.md" },
    { "Description" = "index.md" },
    { "Interactive control" = "interactive-control.md" },
    { "Usage" = "usage.md" },
    { "Configuration files" = "configuration-files.md" },
    { "Using mpv from other programs or scripts" = "using-mpv-from-other-programs-or-scripts.md" },
    { "Taking screenshots" = "taking-screenshots.md" },
    { "Terminal status line" = "terminal-status-line.md" },
    { "Low latency playback" = "low-latency-playback.md" },
    { "Resuming playback" = "resuming-playback.md" },
    { "Protocols" = "protocols.md" },
    { "Pseudo GUI mode" = "pseudo-gui-mode.md" },
    { "Options" = "options.md" },
    { "Audio output drivers" = "audio-output-drivers.md" },
    { "Video output drivers" = "video-output-drivers.md" },
    { "Audio filters" = "audio-filters.md" },
    { "Video filters" = "video-filters.md" },
    { "Encoding" = "encoding.md" },
    { "Command interface" = [
        { "Command interface" = "command-interface/index.md" },
        { "input.conf" = "command-interface/input.conf.md" },
        { "input.conf syntax" = "command-interface/input.conf-syntax.md" },
        { "Key matching" = "command-interface/key-matching.md" },
        { "Key names" = "command-interface/key-names.md" },
        { "Flat command syntax" = "command-interface/flat-command-syntax.md" },
        { "Commands specified as arrays" = "command-interface/commands-specified-as-arrays.md" },
        { "Named arguments" = "command-interface/named-arguments.md" },
        { "List of Input Commands" = "command-interface/list-of-input-commands.md" },
        { "List of events" = "command-interface/list-of-events.md" },
        { "Hooks" = "command-interface/hooks.md" },
        { "Input Command Prefixes" = "command-interface/input-command-prefixes.md" },
        { "Synchronous vs. Asynchronous" = "command-interface/synchronous-vs.-asynchronous.md" },
        { "Asynchronous command details" = "command-interface/asynchronous-command-details.md" },
        { "Input Sections" = "command-interface/input-sections.md" },
        { "Properties" = "command-interface/properties.md" },
        { "Property list" = "command-interface/property-list.md" },
        { "Inconsistencies between options and properties" = "command-interface/inconsistencies-between-options-and-properties.md" },
        { "Property Expansion" = "command-interface/property-expansion.md" },
        { "Raw and Formatted Properties" = "command-interface/raw-and-formatted-properties.md" },
    ] },
    { "On screen controller" = "on-screen-controller.md" },
    { "Stats" = "stats.md" },
    { "Console" = "console.md" },
    { "Commands" = "commands.md" },
    { "Select" = "select.md" },
    { "Context menu script" = "context-menu-script.md" },
    { "Positioning" = "positioning.md" },
    { "Lua scripting" = "lua-scripting.md" },
    { "JavaScript" = "javascript.md" },
    { "JSON IPC" = "json-ipc.md" },
    { "Changelog" = "changelog.md" },
    { "Embedding into other programs (libmpv)" = "embedding-into-other-programs-libmpv.md" },
    { "C plugins" = "c-plugins.md" },
    { "Environment variables" = "environment-variables.md" },
    { "Exit codes" = "exit-codes.md" },
    { "Optical drives" = "optical-drives.md" },
    { "Files" = "files.md" },
    { "Files on Windows" = "files-on-windows.md" },
    { "Files on macOS" = "files-on-macos.md" },
]

[project.extra]
generator = false

[project.theme]
language = "en"
logo = "assets/icon.png"
favicon = "assets/icon.png"
features = [
    "content.code.copy",
    "content.footnote.tooltips",
    "navigation.indexes",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[[project.theme.palette]]
media = "(prefers-color-scheme)"
primary = "deep purple"
accent = "deep purple"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
primary = "deep purple"
accent = "deep purple"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
primary = "deep purple"
accent = "deep purple"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/mpv-player/mpv"

[[project.extra.social]]
icon = "fontawesome/brands/x-twitter"
link = "https://twitter.com/mpv_player"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
